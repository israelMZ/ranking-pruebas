<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas + Breaks</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- ESTILOS GENERALES Y FONDO --- */
        body { 
            margin: 0; 
            padding: 40px; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden; 
        }

        .video-fondo { 
            position: fixed; 
            right: 0; 
            bottom: 0; 
            min-width: 100%; 
            min-height: 100%; 
            z-index: -2; 
            object-fit: cover; 
        }

        .overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.75); 
            z-index: -1; 
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            width: 90%; 
            max-width: 1300px; 
            background: rgba(20, 20, 25, 0.4); 
            padding: 40px; 
            border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); 
            z-index: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .chart-wrapper { 
            position: relative; 
            height: 80vh; 
            min-height: 1000px; 
            width: 100%; 
        }

        #rankingVentas { 
            filter: drop-shadow(0px 0px 10px rgba(255, 255, 255, 0.25)); 
        }

        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-10px); text-shadow: 0 0 30px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { 
            color: #FFD700; 
            text-align: center; 
            z-index: 1; 
            font-size: 3.5em; 
            letter-spacing: 3px; 
            margin-bottom: 30px; 
            animation: flotarYBrillar 3s ease-in-out infinite; 
        }

        /* --- BOTONES --- */
        .btn-estadisticas, .btn-break {
            margin-top: 30px; 
            margin-right: 15px;
            padding: 15px 40px; 
            font-size: 1.2em; 
            font-weight: bold; 
            color: white;
            background: rgba(0, 191, 255, 0.2); 
            border: 2px solid #00BFFF; 
            border-radius: 50px; 
            cursor: pointer;
            transition: all 0.3s ease; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.4);
        }

        .btn-break {
            background: rgba(255, 69, 0, 0.2);
            border: 2px solid #FF4500;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.4);
        }

        .btn-estadisticas:hover, .btn-break:hover { 
            background: #00BFFF; 
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.8); 
            transform: scale(1.05); 
        }

        .btn-break:hover {
            background: #FF4500;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.8);
        }

        .botones-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* --- PANEL MODAL --- */
        .modal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(20px); 
            z-index: 999;
            justify-content: center; 
            align-items: center; 
            opacity: 0; 
            transition: opacity 0.4s ease; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .modal.mostrar { 
            display: flex; 
            opacity: 1; 
        }

        .modal-contenido {
            background: rgba(20, 20, 25, 0.8); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; 
            max-width: 1500px; 
            max-height: 90vh; 
            display: flex; 
            flex-direction: column; 
            position: relative;
            box-shadow: 0 0 50px rgba(0, 191, 255, 0.2);
            overflow-y: auto;
        }

        .modal-titulo { 
            color: #00BFFF; 
            font-size: 2em; 
            margin-top: 0; 
            margin-bottom: 10px; 
            text-align: center; 
            text-shadow: 0 0 15px #00BFFF; 
        }

        .modal-titulo.break-title {
            color: #FF4500;
            text-shadow: 0 0 15px #FF4500;
        }

        /* --- ESTILO DE LA FRASE MOTIVACIONAL --- */
        .frase-motivacional {
            color: #FFD700; 
            font-size: 1.2em; 
            font-style: italic; 
            text-align: center; 
            margin-top: 0; 
            margin-bottom: 30px; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); 
            letter-spacing: 1px;
        }

        .btn-cerrar { 
            position: absolute; 
            top: 20px; 
            right: 30px; 
            font-size: 2em; 
            color: white; 
            cursor: pointer; 
            transition: color 0.3s ease; 
        }

        .btn-cerrar:hover { 
            color: #FF4500; 
        }

        /* --- TABLA EXCEL NEÓN --- */
        .contenedor-tabla { 
            overflow-x: auto; 
            overflow-y: auto; 
            flex-grow: 1; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: center; 
            white-space: nowrap; 
        }

        th { 
            padding: 15px; 
            font-size: 14px; 
            letter-spacing: 1px; 
            color: white; 
            background: rgba(0,0,0,0.6); 
            position: sticky; 
            top: 0; 
            z-index: 2; 
            border-bottom: 2px solid rgba(255,255,255,0.2); 
        }

        td { 
            padding: 12px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-weight: bold; 
            font-size: 15px; 
        }

        tr:hover td { 
            filter: brightness(1.5); 
        }

        .col-asesor { 
            background: rgba(50, 50, 50, 0.4); 
            text-align: left; 
            padding-left: 20px; 
        }

        .col-naranja { 
            background: rgba(255, 140, 0, 0.15); 
            color: #FFB04F; 
        } 

        .col-rojo { 
            background: rgba(255, 69, 0, 0.15); 
            color: #FF6347; 
        }    

        .col-azul { 
            background: rgba(0, 191, 255, 0.15); 
            color: #00BFFF; 
        }   

        .col-verde { 
            background: rgba(50, 205, 50, 0.15); 
            color: #32CD32; 
        }  

        .border-right { 
            border-right: 1px solid rgba(255,255,255,0.1); 
        }

        /* --- ESTILOS PARA BREAKS --- */
        .grid-asesores { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-top: 20px; 
        }

        .card-break { 
            background: #25252b; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            border: 1px solid #444; 
        }

        .timer-display { 
            font-size: 1.8em; 
            font-family: monospace; 
            color: #FF4500; 
            margin: 10px 0; 
        }

        .btn-start { 
            background: #FF4500; 
            border: none; 
            color: white; 
            padding: 8px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
        }

        .btn-start:disabled { 
            background: #333; 
            color: #777; 
            cursor: not-allowed; 
            border: 1px solid #444; 
        }

        .info-break {
            color: #aaa;
            text-align: center;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <h1>🏆 RANKING DE VENTAS 🏆</h1>

    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>

        <div class="botones-container">
            <button id="btnAbrirStats" class="btn-estadisticas">📊 TABLA DE DESGLOSE</button>
            <button id="btnAbrirBreak" class="btn-break">⏱️ ADMINISTRAR BREAKS</button>
        </div>
    </div>

    <!-- MODAL ESTADÍSTICAS -->
    <div id="modalStats" class="modal">
        <div class="modal-contenido">
            <span id="btnCerrarStats" class="btn-cerrar">✖</span>
            <h2 class="modal-titulo">REPORTE DETALLADO DEL EQUIPO</h2>

            <p class="frase-motivacional">"Hoy es una oportunidad para ser mejor que el día anterior"</p>

            <div class="contenedor-tabla">
                <table>
                    <thead>
                        <tr>
                            <th class="col-asesor border-right">ASESOR</th>
                            <th class="col-naranja border-right">INGRESOS</th>
                            <th class="col-rojo">CANC. CLIENTE</th>
                            <th class="col-rojo border-right">CANC. OP</th>
                            <th class="col-azul border-right">PROGRAMADA</th>
                            <th class="col-verde border-right">INSTALADAS</th>
                            <th class="col-naranja border-right">TOTAL</th>
                            <th class="col-naranja">CONVERTIBILIDAD</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL BREAKS -->
    <div id="modalBreak" class="modal">
        <div class="modal-contenido">
            <span class="btn-cerrar" onclick="cerrarModal('modalBreak')">✖</span>
            <h2 class="modal-titulo break-title">⏱️ ADMINISTRACIÓN DE BREAKS</h2>
            <p class="info-break">Solo el administrador puede iniciar el tiempo.</p>
            <div id="gridAsesores" class="grid-asesores"></div>
        </div>
    </div>

    <script>
        // ========== CONFIGURACIÓN GENERAL ==========
        const URL_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfvuQqIcH6Zv8rqvsqeolWoX7Z3lIKZqz2nX-Q0aCRBZcPRvXAXz8rjKyoAZ-OmiI9GfpNkMjK9Uht/pub?output=csv';
        const PASS_ADMIN = "tiger123@";
        
        let miGrafico = null;
        let asesoresList = [];
        let breaksActivos = {}; // Almacenar breaks en memoria
        let intervalosActivos = {}; // Almacenar intervalos para limpiarlos

        // ========== FUNCIONES DE MODAL ==========
        function cerrarModal(idModal) {
            document.getElementById(idModal).classList.remove('mostrar');
        }

        // ========== FUNCIONES DE PERSISTENCIA ==========
        function guardarBreaksEnStorage() {
            localStorage.setItem('breaksActivos', JSON.stringify(breaksActivos));
        }

        function cargarBreaksDelStorage() {
            const datos = localStorage.getItem('breaksActivos');
            if (datos) {
                try {
                    breaksActivos = JSON.parse(datos);
                } catch (e) {
                    breaksActivos = {};
                }
            }
        }

        function limpiarBreakTerminado(index) {
            delete breaksActivos[index];
            guardarBreaksEnStorage();
        }

        // ========== CARGA Y PROCESAMIENTO DE DATOS ==========
        async function cargarDatos() {
            try {
                const urlConFiltro = URL_SHEET + '&t=' + new Date().getTime();
                const respuesta = await fetch(urlConFiltro);
                const dataRaw = await respuesta.text();
                const filas = dataRaw.split('\n').slice(1);

                let asesoresMap = new Map();

                filas.forEach(linea => {
                    const c = linea.replace(/\r/g, '').split(',');
                    if(c.length < 6 || c[0].trim() === '' || c[0].trim().toUpperCase() === 'ASESOR') return;

                    const nombre = c[0].trim();
                    const ingresos = parseInt(c[1]) || 0;
                    const cancCliente = parseInt(c[2]) || 0;
                    const cancOp = parseInt(c[3]) || 0;
                    const programada = parseInt(c[4]) || 0;
                    const instaladas = parseInt(c[5]) || 0;

                    if (asesoresMap.has(nombre)) {
                        const asExistente = asesoresMap.get(nombre);
                        asesoresMap.set(nombre, {
                            nombre,
                            ingresos: asExistente.ingresos + ingresos,
                            cancCliente: asExistente.cancCliente + cancCliente,
                            cancOp: asExistente.cancOp + cancOp,
                            programada: asExistente.programada + programada,
                            instaladas: asExistente.instaladas + instaladas
                        });
                    } else {
                        asesoresMap.set(nombre, { nombre, ingresos, cancCliente, cancOp, programada, instaladas });
                    }
                });

                let asesoresUnicos = Array.from(asesoresMap.values());
                asesoresUnicos.sort((a, b) => b.instaladas - a.instaladas);

                // Actualizar lista de asesores para breaks
                asesoresList = asesoresUnicos.map(a => a.nombre);
                
                llenarTabla(asesoresUnicos);
                dibujarGrafico(asesoresUnicos);
                setupBreakGrid();
                reanudarBreaksActivos();

                console.log("Datos gráficos actualizados: " + new Date().toLocaleTimeString());

            } catch (error) {
                console.error("Error cargando datos:", error);
            }
        }

        // ========== TABLA DE ESTADÍSTICAS ==========
        function llenarTabla(asesores) {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = '';
            asesores.forEach(as => {
                const totalCalculado = as.cancCliente + as.cancOp + as.programada + as.instaladas;
                const convertibilidad = as.ingresos > 0 ? ((as.instaladas / as.ingresos) * 100).toFixed(2) : "0.00";

                cuerpo.innerHTML += `
                    <tr>
                        <td class="col-asesor border-right">${as.nombre}</td>
                        <td class="col-naranja border-right">${as.ingresos}</td>
                        <td class="col-rojo">${as.cancCliente}</td>
                        <td class="col-rojo border-right">${as.cancOp}</td>
                        <td class="col-azul border-right">${as.programada}</td>
                        <td class="col-verde border-right">${as.instaladas}</td>
                        <td class="col-naranja border-right">${totalCalculado}</td>
                        <td class="col-naranja">${convertibilidad} %</td>
                    </tr>`;
            });
        }

        // ========== GRÁFICO DE RANKING ==========
        function dibujarGrafico(asesores) {
            const ctx = document.getElementById('rankingVentas').getContext('2d');

            const nombresInsignia = asesores.map((as, i) => {
                if (i === 0) return '👑 ' + as.nombre;
                if (i === 1) return '🥈 ' + as.nombre;
                if (i === 2) return '🥉 ' + as.nombre;
                return as.nombre;
            });

            const ventas = asesores.map(as => as.instaladas);

            const colores = ventas.map(v => v >= 10 ? 'rgba(255, 215, 0, 0.8)' : v >= 7 ? 'rgba(0, 255, 127, 0.8)' : v >= 4 ? 'rgba(0, 191, 255, 0.8)' : 'rgba(138, 43, 226, 0.6)');
            const bordes = ventas.map(v => v >= 10 ? '#FFD700' : v >= 7 ? '#00FF7F' : v >= 4 ? '#00BFFF' : '#8A2BE2');
            const coloresTxt = ventas.map(v => v >= 10 ? '#FFD700' : v >= 7 ? '#00FF7F' : v >= 4 ? '#00BFFF' : '#E066FF');

            Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";

            if (miGrafico) {
                miGrafico.destroy();
            }

            let delayed;
            miGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: nombresInsignia,
                    datasets: [{
                        label: 'Ventas Instaladas',
                        data: ventas,
                        backgroundColor: colores,
                        borderColor: bordes,
                        borderWidth: 2,
                        borderRadius: 10,
                        barPercentage: 0.7
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        onComplete: () => { delayed = true; },
                        delay: (context) => {
                            let delay = 0;
                            if (context.type === 'data' && context.mode === 'default' && !delayed) {
                                delay = context.dataIndex * 150;
                            }
                            return delay;
                        },
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.95)',
                            titleFont: { size: 18, weight: 'bold' },
                            bodyFont: { size: 15 },
                            padding: 15,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    const as = asesores[context.dataIndex];
                                    const conv = as.ingresos > 0 ? ((as.instaladas / as.ingresos) * 100).toFixed(1) : "0.0";
                                    return [` ✅ Instaladas: ${as.instaladas}`, ` 📥 Ingresadas: ${as.ingresos}`, ` 📊 Convertibilidad: ${conv}%`];
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            max: 30,
                            grid: { color: 'rgba(255,255,255,0.08)' },
                            ticks: { color: '#bbbbbb', stepSize: 5 }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: coloresTxt, font: { weight: 'bold' } }
                        }
                    }
                }
            });
        }

        // ========== SISTEMA DE BREAKS ==========
        function setupBreakGrid() {
            const grid = document.getElementById('gridAsesores');
            grid.innerHTML = '';
            
            asesoresList.forEach((nombre, index) => {
                const card = document.createElement('div');
                card.className = 'card-break';
                
                // Determinar duración según asesor
                let duracionMinutos = 35;
                if (nombre.toUpperCase() === "GIANELLA SUAREZ") {
                    duracionMinutos = 20;
                }
                
                // Mostrar tiempo correcto
                let timerDisplay = `${duracionMinutos}:00`;
                let btnText = "INICIAR BREAK";
                let btnDisabled = false;
                
                // Si hay un break activo, mostrar estado
                if (breaksActivos[index]) {
                    btnText = "EN BREAK";
                    btnDisabled = true;
                    timerDisplay = breaksActivos[index].display;
                }
                
                card.innerHTML = `
                    <div style="font-weight:bold; height: 40px; display:flex; align-items:center; justify-content:center;">${nombre}</div>
                    <div id="timer-${index}" class="timer-display">${timerDisplay}</div>
                    <button id="btn-${index}" class="btn-start" onclick="verificarYIniciar(${index})" ${btnDisabled ? 'disabled' : ''}>
                        ${btnText}
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function verificarYIniciar(index) {
            const passwordInput = prompt("Ingrese la contraseña de administrador:");

            if (passwordInput === PASS_ADMIN) {
                startBreak(index);
            } else if (passwordInput !== null) {
                alert("Contraseña incorrecta.");
            }
        }

        function startBreak(index) {
            const btn = document.getElementById(`btn-${index}`);
            const display = document.getElementById(`timer-${index}`);
            const nombreAsesor = asesoresList[index];
            
            // Determinar duración según asesor
            let duracionMinutos = 35;
            if (nombreAsesor.toUpperCase() === "GIANELLA SUAREZ") {
                duracionMinutos = 20;
            }
            
            let tiempo = duracionMinutos * 60;
            const horaInicio = Date.now();

            btn.disabled = true;
            btn.innerText = "EN BREAK";

            // Guardar en memoria
            breaksActivos[index] = {
                inicio: horaInicio,
                duracion: tiempo,
                display: `${duracionMinutos}:00`,
                nombreAsesor: nombreAsesor,
                intervaloId: null
            };
            guardarBreaksEnStorage();

            const intervalo = setInterval(() => {
                let minutos = Math.floor(tiempo / 60);
                let segundos = tiempo % 60;

                minutos = minutos < 10 ? '0' + minutos : minutos;
                segundos = segundos < 10 ? '0' + segundos : segundos;

                const timerStr = `${minutos}:${segundos}`;
                display.innerText = timerStr;
                
                // Actualizar en storage
                if (breaksActivos[index]) {
                    breaksActivos[index].display = timerStr;
                    guardarBreaksEnStorage();
                }

                if (tiempo <= 0) {
                    clearInterval(intervalo);
                    display.innerText = "TERMINADO";
                    display.style.color = "#00FF7F";
                    btn.innerText = "FINALIZADO";
                    
                    // Limpiar después de 3 segundos
                    setTimeout(() => {
                        limpiarBreakTerminado(index);
                        setupBreakGrid();
                    }, 3000);
                } else {
                    tiempo--;
                }
            }, 1000);

            intervalosActivos[index] = intervalo;
        }

        function reanudarBreaksActivos() {
            Object.keys(breaksActivos).forEach(indexStr => {
                const index = parseInt(indexStr);
                const breakData = breaksActivos[index];
                
                if (breakData && breakData.inicio) {
                    const ahora = Date.now();
                    const tiempoTranscurrido = Math.floor((ahora - breakData.inicio) / 1000);
                    let tiempoRestante = breakData.duracion - tiempoTranscurrido;
                    
                    if (tiempoRestante > 0) {
                        const btn = document.getElementById(`btn-${index}`);
                        const display = document.getElementById(`timer-${index}`);
                        
                        if (btn) btn.disabled = true;
                        if (btn) btn.innerText = "EN BREAK";
                        
                        const intervalo = setInterval(() => {
                            let minutos = Math.floor(tiempoRestante / 60);
                            let segundos = tiempoRestante % 60;

                            minutos = minutos < 10 ? '0' + minutos : minutos;
                            segundos = segundos < 10 ? '0' + segundos : segundos;

                            const timerStr = `${minutos}:${segundos}`;
                            if (display) display.innerText = timerStr;
                            
                            if (breaksActivos[index]) {
                                breaksActivos[index].display = timerStr;
                                guardasBreaksEnStorage();
                            }

                            if (tiempoRestante <= 0) {
                                clearInterval(intervalo);
                                if (display) {
                                    display.innerText = "TERMINADO";
                                    display.style.color = "#00FF7F";
                                }
                                if (btn) btn.innerText = "FINALIZADO";
                                
                                setTimeout(() => {
                                    limpiarBreakTerminado(index);
                                    setupBreakGrid();
                                }, 3000);
                            } else {
                                tiempoRestante--;
                            }
                        }, 1000);

                        intervalosActivos[index] = intervalo;
                    } else {
                        limpiarBreakTerminado(index);
                    }
                }
            });
        }

        // ========== EVENT LISTENERS ==========
        const modal = document.getElementById('modalStats');
        document.getElementById('btnAbrirStats').addEventListener('click', () => modal.classList.add('mostrar'));
        document.getElementById('btnCerrarStats').addEventListener('click', () => modal.classList.remove('mostrar'));

        const modalBreak = document.getElementById('modalBreak');
        document.getElementById('btnAbrirBreak').addEventListener('click', () => modalBreak.classList.add('mostrar'));

        // ========== INICIALIZACIÓN Y AUTO-REFRESH ==========
        cargarBreaksDelStorage();
        cargarDatos();
        setInterval(cargarDatos, 120000); // Actualiza cada 2 minutos

    </script>

</body>
</html>
