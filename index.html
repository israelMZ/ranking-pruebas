<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas + Realtime Pizarra</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { 
            margin: 0; padding: 40px; color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden; 
        }

        .video-fondo { 
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; 
            z-index: -2; object-fit: cover; 
        }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.75); z-index: -1; 
        }

        .container {
            width: 90%; max-width: 1300px; background: rgba(20, 20, 25, 0.4); 
            padding: 40px; border-radius: 25px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); 
            z-index: 1; display: flex; flex-direction: column; align-items: center;
        }

        .chart-wrapper { position: relative; height: 80vh; min-height: 1000px; width: 100%; }

        h1 { 
            color: #FFD700; text-align: center; z-index: 1; font-size: 3.5em; 
            letter-spacing: 3px; margin-bottom: 30px; animation: flotarYBrillar 3s ease-in-out infinite; 
        }

        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-10px); text-shadow: 0 0 30px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        /* BOTONES PRINCIPALES */
        .botones-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .btn-estadisticas, .btn-break, .btn-pizarra, .btn-bonos {
            padding: 15px 40px; font-size: 1.2em; font-weight: bold; color: white;
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease; 
            text-transform: uppercase; letter-spacing: 2px; 
        }
        .btn-estadisticas { background: rgba(0, 191, 255, 0.2); border: 2px solid #00BFFF; }
        .btn-break { background: rgba(255, 165, 0, 0.2); border: 2px solid #FFA500; }
        .btn-pizarra { background: rgba(138, 43, 226, 0.2); border: 2px solid #8A2BE2; }
        .btn-bonos { background: rgba(50, 205, 50, 0.2); border: 2px solid #32CD32; }

        .btn-estadisticas:hover { background: #00BFFF; box-shadow: 0 0 30px #00BFFF; transform: scale(1.05); }
        .btn-break:hover { background: #FFA500; box-shadow: 0 0 30px #FFA500; transform: scale(1.05); }
        .btn-pizarra:hover { background: #8A2BE2; box-shadow: 0 0 30px #8A2BE2; transform: scale(1.05); }
        .btn-bonos:hover { background: #32CD32; box-shadow: 0 0 30px #32CD32; transform: scale(1.05); }

        /* MODALES */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); z-index: 999;
            justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s ease; 
        }
        .modal.mostrar { display: flex; opacity: 1; }
        .modal-contenido {
            background: rgba(20, 20, 25, 0.9); padding: 30px; border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); width: 95%; max-width: 1400px; 
            max-height: 90vh; overflow-y: auto; position: relative;
        }
        .btn-cerrar { position: absolute; top: 15px; right: 25px; font-size: 2em; color: white; cursor: pointer; z-index: 10; }

        /* TABLA */
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { background: rgba(0,0,0,0.6); padding: 15px; sticky: top; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .col-asesor { text-align: left; padding-left: 20px; background: rgba(50,50,50,0.2); }

        /* BREAK CARDS */
        .grid-asesores { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .card-break { background: #25252b; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .card-break.lider { border: 2px solid #00FF7F; background: #1a3a3a; }
        .timer-display { font-size: 1.8em; font-family: monospace; color: #FFA500; margin: 10px 0; }
        .btn-start { background: #FFA500; border: none; padding: 8px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; }
        .lider-badge { background: #00FF7F; color: black; font-size: 0.7em; padding: 2px 5px; border-radius: 3px; margin-left: 5px; }

        /* PIZARRA */
        .header-pizarra { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .meta-pizza { font-size: 1.3em; font-weight: bold; border: 2px solid #FFD700; padding: 10px 20px; border-radius: 12px; background: rgba(255,215,0,0.1); }
        .contadores-campanas { display: flex; gap: 15px; font-size: 1.4em; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
        .pizarra-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .pizarra-seccion { border: 2px solid; border-radius: 15px; padding: 15px; }
        .pizarra-seccion.claro { border-color: #FF0000; }
        .pizarra-seccion.wow { border-color: #9933FF; }
        .pizarra-seccion.movistar { border-color: #0099FF; }
        .pizarra-titulo { font-size: 1.2em; text-align: center; margin-bottom: 15px; font-style: italic; }
        .pizarra-asesor { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid;
        }
        .claro .pizarra-asesor { background: rgba(255,0,0,0.15); border-left-color: #FF0000; }
        .wow .pizarra-asesor { background: rgba(153,51,255,0.15); border-left-color: #9933FF; }
        .movistar .pizarra-asesor { background: rgba(0,153,255,0.15); border-left-color: #0099FF; }

        /* MINI BOTONES ESTRELLAS */
        .btn-mini-estrella { padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid; font-weight: bold; background: none; color: inherit; }
        .btn-mini-claro:hover { background: #FF0000; color: white; }
        .btn-mini-wow:hover { background: #9933FF; color: white; }
        .btn-mini-movistar:hover { background: #0099FF; color: white; }
        .btn-restar { color: #FF4500; border: 1px solid #FF4500; padding: 2px 8px; margin-right: 5px; cursor: pointer; border-radius: 4px; }

        /* BONOS FULL SCREEN */
        .imagen-bonos-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .imagen-bonos { width: 100%; height: 100%; object-fit: contain; }

        /* ANIMACIÓN PIZZA */
        .pizza-cayendo { position: fixed; top: -50px; font-size: 35px; z-index: 9999; pointer-events: none; animation: caidaPizza 4s linear forwards; }
        @keyframes caidaPizza { 
            0% { transform: translateY(0) rotate(0deg); opacity: 1; } 
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } 
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <h1>🏆 RANKING DE VENTAS 🏆</h1>

    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>
        <div class="botones-container">
            <button id="btnAbrirStats" class="btn-estadisticas">📊 TABLA</button>
            <button id="btnAbrirBreak" class="btn-break">⏱️ BREAKS</button>
            <button id="btnAbrirPizarra" class="btn-pizarra">📋 PIZARRA</button>
            <button id="btnAbrirBonos" class="btn-bonos">🎁 BONOS</button>
        </div>
    </div>

    <div id="modalStats" class="modal">
        <div class="modal-contenido">
            <span class="btn-cerrar" onclick="cerrarModal('modalStats')">✖</span>
            <h2 style="text-align:center; color:#00BFFF">REPORTE DETALLADO</h2>
            <table>
                <thead>
                    <tr><th>ASESOR</th><th>INGRESOS</th><th>CANC. CLI</th><th>INSTALADAS</th><th>CONV.</th></tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>

    <div id="modalBreak" class="modal">
        <div class="modal-contenido">
            <span class="btn-cerrar" onclick="cerrarModal('modalBreak')">✖</span>
            <h2 style="text-align:center; color:#FFA500">ADMINISTRACIÓN DE BREAKS</h2>
            <div id="gridAsesores" class="grid-asesores"></div>
        </div>
    </div>

    <div id="modalPizarra" class="modal">
        <div class="modal-contenido">
            <span class="btn-cerrar" onclick="cerrarModal('modalPizarra')">✖</span>
            <div class="header-pizarra">
                <div class="meta-pizza">🍕 META: <span id="metaPizzaTxt" style="color:#FFD700">Faltan 28</span></div>
                <div class="contadores-campanas">
                    <span style="color:#FF0000">★ <span id="countClaro">0</span></span>
                    <span style="color:#9933FF">★ <span id="countWow">0</span></span>
                    <span style="color:#0099FF">★ <span id="countMovi">0</span></span>
                </div>
                <button onclick="resetPizarraConPass()" style="background:rgba(255,0,0,0.2); color:red; border:1px solid red; cursor:pointer; padding:5px 10px; border-radius:5px;">♻️ REINICIAR</button>
            </div>
            <div class="pizarra-container" id="pizarraGrid"></div>
        </div>
    </div>

    <div id="modalBonos" class="modal">
        <div class="modal-contenido" style="height:90vh; padding:0; overflow:hidden">
            <span class="btn-cerrar" onclick="cerrarModal('modalBonos')">✖</span>
            <div class="imagen-bonos-container">
                <img src="mis-bonos.png" class="imagen-bonos" alt="Bonos">
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAgtu5-MT9OcKY5nvoq-yxpnUXiZSEz7io",
            authDomain: "proyecttiger.firebaseapp.com",
            databaseURL: "https://proyecttiger-default-rtdb.firebaseio.com/",
            projectId: "proyecttiger",
            storageBucket: "proyecttiger.firebasestorage.app",
            messagingSenderId: "272290320977",
            appId: "1:272290320977:web:72ada1dfd86501ca6d9e70"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // CONFIGURACIÓN GOOGLE SHEETS
        const URL_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfvuQqIcH6Zv8rqvsqeolWoX7Z3lIKZqz2nX-Q0aCRBZcPRvXAXz8rjKyoAZ-OmiI9GfpNkMjK9Uht/pub?output=csv';
        const URL_SHEET_PIZARRA = 'https://docs.google.com/spreadsheets/d/1u37Zs5aSHL62Z1whx1ixBdrnoiaVf3xztf_FU_w0RKw/export?gid=543637953&format=csv';
        const PASS_ADMIN = "tiger123@";

        const LIDERES = ["MIKE ROMERO", "RAMIRO FLORES", "JEYKO BAZALAR", "PAULINA SUTTI", "ICEL MORENO", "ISRAEL OSORIO", "RICKSON FIGUEROA"];
        
        let starsData = {};
        let pizarraLayout = { claro: [], wow: [], movistar: [] };
        let metaLograda = false;

        // --- LÓGICA DE MODALES ---
        function abrirModal(id) { document.getElementById(id).classList.add('mostrar'); }
        function cerrarModal(id) { document.getElementById(id).classList.remove('mostrar'); }

        document.getElementById('btnAbrirStats').onclick = () => abrirModal('modalStats');
        document.getElementById('btnAbrirBreak').onclick = () => abrirModal('modalBreak');
        document.getElementById('btnAbrirPizarra').onclick = () => abrirModal('modalPizarra');
        document.getElementById('btnAbrirBonos').onclick = () => abrirModal('modalBonos');

        // --- LÓGICA FIREBASE (TIEMPO REAL) ---
        db.ref('pizarra/estrellas').on('value', (snap) => {
            starsData = snap.val() || {};
            renderPizarra();
        });

        function pushEstrella(nombre, color) {
            if(!starsData[nombre]) starsData[nombre] = [];
            starsData[nombre].push(color);
            db.ref('pizarra/estrellas').set(starsData);
        }

        function popEstrella(nombre) {
            if(starsData[nombre] && starsData[nombre].length > 0) {
                starsData[nombre].pop();
                db.ref('pizarra/estrellas').set(starsData);
            }
        }

        function resetPizarraConPass() {
            if(prompt("Contraseña:") === PASS_ADMIN) {
                db.ref('pizarra/estrellas').remove();
                metaLograda = false;
                alert("Pizarra reiniciada.");
            }
        }

        // --- LÓGICA DE PIZARRA ---
        async function cargarPizarraCSV() {
            const res = await fetch(URL_SHEET_PIZARRA + '&t=' + Date.now());
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            pizarraLayout = { claro: [], wow: [], movistar: [] };
            rows.forEach(r => {
                const cols = r.split(',');
                if(cols[0]?.trim()) pizarraLayout.claro.push(cols[0].trim());
                if(cols[1]?.trim()) pizarraLayout.wow.push(cols[1].trim());
                if(cols[2]?.trim()) pizarraLayout.movistar.push(cols[2].trim());
            });
            renderPizarra();
        }

        function renderPizarra() {
            const grid = document.getElementById('pizarraGrid');
            if(!grid) return;
            grid.innerHTML = '';
            
            let tTotal = 0, tClaro = 0, tWow = 0, tMovi = 0;

            const sections = [
                { id: 'claro', title: '"La disciplina vence al talento"', color: 'claro' },
                { id: 'wow', title: '"Pequeños pasos, grandes metas"', color: 'wow' },
                { id: 'movistar', title: '"Tu única competencia eres tú"', color: 'movistar' }
            ];

            sections.forEach(sec => {
                const div = document.createElement('div');
                div.className = `pizarra-seccion ${sec.color}`;
                div.innerHTML = `<div class="pizarra-titulo">${sec.title}</div>`;
                
                pizarraLayout[sec.id].forEach(nombre => {
                    const historial = starsData[nombre] || [];
                    tTotal += historial.length;
                    
                    let estrellasHTML = '';
                    historial.forEach(c => {
                        if(c==='red') { estrellasHTML += '<span style="color:red">★</span>'; tClaro++; }
                        if(c==='purple') { estrellasHTML += '<span style="color:#9933FF">★</span>'; tWow++; }
                        if(c==='blue') { estrellasHTML += '<span style="color:#0099FF">★</span>'; tMovi++; }
                    });

                    div.innerHTML += `
                        <div class="pizarra-asesor">
                            <div><button class="btn-restar" onclick="popEstrella('${nombre}')">-</button>${nombre}</div>
                            <div>
                                <span style="margin-right:10px">${estrellasHTML}</span>
                                <button class="btn-mini-estrella btn-mini-claro" onclick="pushEstrella('${nombre}','red')">+</button>
                                <button class="btn-mini-estrella btn-mini-wow" onclick="pushEstrella('${nombre}','purple')">+</button>
                                <button class="btn-mini-estrella btn-mini-movistar" onclick="pushEstrella('${nombre}','blue')">+</button>
                            </div>
                        </div>`;
                });
                grid.appendChild(div);
            });

            // Actualizar contadores
            document.getElementById('countClaro').innerText = tClaro;
            document.getElementById('countWow').innerText = tWow;
            document.getElementById('countMovi').innerText = tMovi;
            
            const faltan = 28 - tTotal;
            const metaTxt = document.getElementById('metaPizzaTxt');
            if(faltan > 0) {
                metaTxt.innerText = `Faltan ${faltan}`;
                metaTxt.style.color = "#FFD700";
            } else {
                metaTxt.innerText = "¡LOGRADO! 🎉";
                metaTxt.style.color = "#00FF7F";
                if(!metaLograda) { metaLograda = true; lanzarPizzas(); }
            }
        }

        function lanzarPizzas() {
            for(let i=0; i<40; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.innerHTML = '🍕';
                    p.className = 'pizza-cayendo';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.animationDuration = (2 + Math.random() * 2) + 's';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 4000);
                }, i * 150);
            }
        }

        // --- RANKING Y STATS (GOOGLE SHEETS) ---
        let miGrafico = null;
        async function cargarRanking() {
            const res = await fetch(URL_SHEET + '&t=' + Date.now());
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            let map = new Map();

            rows.forEach(r => {
                const c = r.split(',');
                if(!c[0] || c[0].toUpperCase() === 'ASESOR') return;
                const n = c[0].trim();
                const ins = parseInt(c[5]) || 0;
                const ing = parseInt(c[1]) || 0;
                if(map.has(n)) {
                    let d = map.get(n);
                    d.ins += ins; d.ing += ing;
                } else {
                    map.set(n, { n, ins, ing });
                }
            });

            const sorted = Array.from(map.values()).sort((a,b) => b.ins - a.ins);
            
            // Render Tabla
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = '';
            sorted.forEach(a => {
                const conv = a.ing > 0 ? ((a.ins/a.ing)*100).toFixed(1) : 0;
                cuerpo.innerHTML += `<tr><td class="col-asesor">${a.n}</td><td>${a.ing}</td><td>-</td><td>${a.ins}</td><td>${conv}%</td></tr>`;
            });

            // Render Gráfico
            const ctx = document.getElementById('rankingVentas').getContext('2d');
            if(miGrafico) miGrafico.destroy();
            miGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map((a,i) => (i<3 ? ['🥇','🥈','🥉'][i] : '') + a.n),
                    datasets: [{
                        data: sorted.map(a => a.ins),
                        backgroundColor: sorted.map(a => a.ins >= 10 ? '#FFD700' : a.ins >= 7 ? '#00FF7F' : '#00BFFF'),
                        borderRadius: 8
                    }]
                },
                options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, max: 30 } } }
            });

            // Render Breaks Grid
            const breakGrid = document.getElementById('gridAsesores');
            breakGrid.innerHTML = '';
            sorted.forEach(a => {
                if(["ISABELLE GARCIA", "HENRY MAMANI"].includes(a.n.toUpperCase())) return;
                const card = document.createElement('div');
                const esLider = LIDERES.includes(a.n.toUpperCase());
                card.className = `card-break ${esLider ? 'lider' : ''}`;
                
                let tiempo = esLider ? 40 : 35;
                if(a.n.toUpperCase() === "GIANELLA SUAREZ") tiempo = 20;

                card.innerHTML = `
                    <div style="font-weight:bold">${a.n} ${esLider ? '<span class="lider-badge">LÍDER</span>' : ''}</div>
                    <div class="timer-display" id="timer-${a.n}">${tiempo}:00</div>
                    <button class="btn-start" onclick="iniciarBreak('${a.n}', ${tiempo})">INICIAR</button>
                `;
                breakGrid.appendChild(card);
            });
        }

        function iniciarBreak(nombre, min) {
            if(prompt("Contraseña:") !== PASS_ADMIN) return;
            let seg = min * 60;
            const display = document.getElementById(`timer-${nombre}`);
            const interval = setInterval(() => {
                let m = Math.floor(seg / 60);
                let s = seg % 60;
                display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(seg <= 0) {
                    clearInterval(interval);
                    display.innerText = "FIN";
                    display.style.color = "red";
                }
                seg--;
            }, 1000);
        }

        // Inicios
        cargarRanking();
        cargarPizarraCSV();
        setInterval(cargarRanking, 60000);
    </script>
</body>
</html>
