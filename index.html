<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Élite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 40px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* Evita barras de desplazamiento innecesarias */
        }

        /* 1. Configuración del video para que cubra todo el fondo */
        .video-fondo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2; /* Lo manda al fondo de todo */
            object-fit: cover;
        }

        /* 2. Filtro oscuro encima del video para que resalte el texto */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Ajusta el 0.6 si quieres más o menos oscuridad */
            z-index: -1;
        }

        /* 3. El contenedor del gráfico */
        .container {
            width: 80%;
            background: rgba(26, 26, 26, 0.5);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            z-index: 1; /* Asegura que esté por encima del video */
        }
        h1 { 
            color: #FFD700; 
            text-shadow: 0 0 10px #FFD700; 
            text-align: center; 
            z-index: 1; 
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
        Tu navegador no soporta videos.
    </video>

    <div class="overlay"></div>

    <h1>🏆 TABLERO DE LEYENDAS</h1>
    <div class="container">
        <canvas id="rankingVentas"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('rankingVentas').getContext('2d');
        
        // Tus datos de equipo
        const nombres = ['Sasha', 'Jeyko', 'Rickson', 'Italo', 'Isabelle'];
        const porcentajes = [120, 95, 82, 70, 45]; 

        const colores = porcentajes.map(p => {
            if (p >= 100) return '#FFD700'; // Oro 
            if (p >= 80) return '#00FF7F';  // Verde 
            if (p >= 50) return '#00BFFF';  // Azul 
            return '#FF4500';               // Rojo 
        });

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: nombres,
                datasets: [{
                    label: '% Logrado',
                    data: porcentajes,
                    backgroundColor: colores,
                    borderRadius: 10,
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y', 
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 150,
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: 'white' }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { color: 'white', font: { size: 16, weight: 'bold' } }
                    }
                }
            }
        });
    </script>
</body>
</html>
