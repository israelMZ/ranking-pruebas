<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Élite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 40px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .video-fondo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .container {
            width: 85%;
            max-width: 1200px;
            background: rgba(20, 20, 25, 0.4);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            z-index: 1;
        }

        /* Altura aumentada a 750px para que los 14 asesores entren perfectamente */
        .chart-wrapper {
            position: relative;
            height: 70vh; 
            min-height: 750px; 
            width: 100%;
        }

        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-8px); text-shadow: 0 0 25px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { 
            color: #FFD700; 
            text-align: center; 
            z-index: 1; 
            font-size: 3em;
            letter-spacing: 2px;
            margin-bottom: 40px;
            animation: flotarYBrillar 3s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <h1>🏆 TABLA DE PUNTUACIÓN 🏆</h1>
    
    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('rankingVentas').getContext('2d');
        
        const nombres = ['VALERIA V', 'FABIAN', 'EVA', 'VALERIA M', 'JOMAJAIRA', 'ROMINA', 'JOSEPH','DIEGO','BRIANNA','ALVARO','FRANKI','ALBERT','KENNY','KIMBERLY'];
        
        // Ventas de ejemplo para que veas los colores. ¡Cámbialas por las reales!
        const ventas = [32, 28, 26, 22, 20, 19, 15, 14, 12, 10, 8, 7, 5, 2]; 

        // LÓGICA DE OBJETIVOS (20, 25, 30)
        const coloresFondo = ventas.map(v => {
            if (v >= 30) return 'rgba(255, 215, 0, 0.8)';   // Oro (Objetivo 3)
            if (v >= 25) return 'rgba(0, 255, 127, 0.8)';   // Verde (Objetivo 2)
            if (v >= 20) return 'rgba(0, 191, 255, 0.8)';   // Azul (Objetivo 1)
            return 'rgba(138, 43, 226, 0.5)';               // Morado (En camino)
        });

        const coloresBorde = ventas.map(v => {
            if (v >= 30) return '#FFD700';
            if (v >= 25) return '#00FF7F';
            if (v >= 20) return '#00BFFF';
            return '#8A2BE2';
        });

        Chart.defaults.color = '#ffffff';
        Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";

        let delayed;

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: nombres,
                datasets: [{
                    label: 'Ventas Logradas',
                    data: ventas,
                    backgroundColor: coloresFondo,
                    borderColor: coloresBorde,
                    borderWidth: 2,
                    borderRadius: 8,
                    borderSkipped: false,
                    barPercentage: 0.6
                }]
            },
            options: {
                indexAxis: 'y', 
                responsive: true,
                maintainAspectRatio: false, 
                
                animation: {
                    onComplete: () => {
                        delayed = true;
                    },
                    delay: (context) => {
                        let delay = 0;
                        if (context.type === 'data' && context.mode === 'default' && !delayed) {
                            delay = context.dataIndex * 150; // Lo bajé un poco a 150 para que cargue más rápido al ser 14 personas
                        }
                        return delay;
                    },
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.8)',
                        titleFont: { size: 16 },
                        bodyFont: { size: 14 },
                        padding: 12,
                        displayColors: false
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 35, // ESCALA MÁXIMA AJUSTADA PARA QUE EL 30 LUZCA GENIAL
                        grid: { 
                            color: 'rgba(255, 255, 255, 0.1)', // Líneas de guía un poco más visibles
                            drawBorder: false
                        },
                        ticks: { 
                            color: '#aaaaaa',
                            font: { size: 14 },
                            stepSize: 5 // Para que los números abajo vayan de 5 en 5 (5, 10, 15, 20...)
                        }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { 
                            color: 'white', 
                            font: { size: 16, weight: 'bold' } // Letra un poquitito más pequeña para que entren todos
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
