<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas + Breaks - OR Solutions</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            margin: 0; padding: 40px; color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden; 
        }
        .video-fondo { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -2; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: -1; }
        
        .container {
            width: 90%; max-width: 1300px; background: rgba(20, 20, 25, 0.4); 
            padding: 40px; border-radius: 25px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); z-index: 1; 
            display: flex; flex-direction: column; align-items: center;
        }

        .chart-wrapper { position: relative; height: 80vh; min-height: 800px; width: 100%; }

        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-10px); text-shadow: 0 0 30px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { color: #FFD700; text-align: center; font-size: 3.5em; letter-spacing: 3px; animation: flotarYBrillar 3s infinite; }

        .botones-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        
        button { 
            padding: 15px 30px; font-size: 1.1em; font-weight: bold; color: white; border-radius: 50px; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase; border: 2px solid;
        }
        .btn-estadisticas { background: rgba(0, 191, 255, 0.1); border-color: #00BFFF; }
        .btn-break { background: rgba(255, 69, 0, 0.1); border-color: #FF4500; }
        .btn-pizarra { background: rgba(138, 43, 226, 0.1); border-color: #8A2BE2; }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 1000; 
            justify-content: center; align-items: center;
        }
        .modal.mostrar { display: flex; }
        .modal-contenido { 
            background: #141419; padding: 40px; border-radius: 20px; width: 90%; max-width: 1400px; 
            max-height: 85vh; overflow-y: auto; position: relative; border: 1px solid #333;
        }
        .btn-cerrar { position: absolute; top: 20px; right: 20px; font-size: 2em; cursor: pointer; }

        /* Estilos Pizarra */
        .pizarra-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .pizarra-seccion { background: rgba(255,255,255,0.03); border: 2px solid; border-radius: 15px; padding: 15px; }
        .claro { border-color: #FF0000; } .wow { border-color: #9933FF; } .movistar { border-color: #0099FF; }
        .pizarra-asesor { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.05); padding: 10px; margin-bottom: 8px; border-radius: 8px;
        }
        .estrellas-display { color: #FFD700; margin-right: 10px; }
        .btn-estrella-pizarra { background: #FFD700; color: black; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Estilos Breaks */
        .grid-asesores { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card-break { background: #1e1e24; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .card-break.lider { border-color: #00FF7F; background: #1a2e25; }
        .timer-display { font-size: 1.7em; font-family: monospace; color: #FF4500; margin: 10px 0; }
        .btn-start { width: 100%; padding: 10px; background: #FF4500; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-start:disabled { background: #444; }
        .lider-badge { background: #00FF7F; color: black; font-size: 0.7em; padding: 2px 5px; border-radius: 3px; margin-left: 5px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #000; padding: 15px; sticky: top; }
        td { padding: 12px; border-bottom: 1px solid #222; text-align: center; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo"><source src="tigre.mp4" type="video/mp4"></video>
    <div class="overlay"></div>

    <h1>🏆 RANKING DE VENTAS 🏆</h1>

    <div class="container">
        <div class="chart-wrapper"><canvas id="rankingVentas"></canvas></div>
        <div class="botones-container">
            <button id="btnAbrirStats" class="btn-estadisticas">📊 DESGLOSE</button>
            <button id="btnAbrirBreak" class="btn-break">⏱️ BREAKS</button>
            <button id="btnAbrirPizarra" class="btn-pizarra">📋 PIZARRA</button>
        </div>
    </div>

    <div id="modalStats" class="modal"><div class="modal-contenido"><span class="btn-cerrar" onclick="cerrarModal('modalStats')">✖</span><h2>REPORTE DETALLADO</h2><table><thead><tr><th>ASESOR</th><th>INGRESOS</th><th>C. CLI</th><th>C. OP</th><th>PROG</th><th>INST</th><th>TOTAL</th><th>CONV%</th></tr></thead><tbody id="cuerpoTabla"></tbody></table></div></div>
    
    <div id="modalBreak" class="modal"><div class="modal-contenido"><span class="btn-cerrar" onclick="cerrarModal('modalBreak')">✖</span><h2>⏱️ GESTIÓN DE BREAKS</h2><div id="gridAsesores" class="grid-asesores"></div></div></div>

    <div id="modalPizarra" class="modal"><div class="modal-contenido"><span class="btn-cerrar" onclick="cerrarModal('modalPizarra')">✖</span><h2>📋 PIZARRA DE VENTAS</h2><div class="pizarra-container" id="pizarraContainer"></div></div></div>

    <script>
        const URL_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfvuQqIcH6Zv8rqvsqeolWoX7Z3lIKZqz2nX-Q0aCRBZcPRvXAXz8rjKyoAZ-OmiI9GfpNkMjK9Uht/pub?output=csv';
        const URL_SHEET_PIZARRA = 'https://docs.google.com/spreadsheets/d/1u37Zs5aSHL62Z1whx1ixBdrnoiaVf3xztf_FU_w0RKw/export?gid=543637953&format=csv';
        const PASS_ADMIN = "tiger123@";

        const ASESORES_SIN_BREAKS = ["ISABELLE GARCIA", "LEONARDO CASTILLO", "HENRY MAMANI", "ARMANDO ZAVALETA", "PEDRO LOPEZ", "DIEGO OLIVARES", "LEONARDO YOBERA", "ROMINA SOLIS"];
        const LIDERES = ["MIKE ROMERO", "RAMIRO FLORES", "JEYKO BAZALAR", "PAULINA SUTTI", "ICEL MORENO", "ISRAEL OSORIO", "RICKSON FIGUEROA"];

        let miGrafico = null;
        let pizarraData = { claro: [], wow: [], movistar: [] };
        let estrellasData = JSON.parse(localStorage.getItem('estrellas')) || {};
        let breaksActivos = JSON.parse(localStorage.getItem('breaksActivos')) || {};
        let intervalosActivos = {};
        let asesoresBreaks = [];

        function cerrarModal(id) { document.getElementById(id).classList.remove('mostrar'); }

        // --- LÓGICA PIZARRA CORREGIDA (ESTRELLAS INDIVIDUALES) ---
        function agregarEstrella(nombre) {
            const n = nombre.trim();
            estrellasData[n] = (estrellasData[n] || 0) + 1;
            localStorage.setItem('estrellas', JSON.stringify(estrellasData));
            construirPizarra();
        }

        async function cargarDatosPizarra() {
            try {
                const res = await fetch(URL_SHEET_PIZARRA + '&t=' + Date.now());
                const csv = await res.text();
                const filas = csv.split('\n').slice(1);
                pizarraData = { claro: [], wow: [], movistar: [] };
                filas.forEach(f => {
                    const c = f.replace(/\r/g, '').split(',');
                    if(c[0] && c[0].trim().toUpperCase() !== 'CLARO') pizarraData.claro.push(c[0].trim());
                    if(c[1] && c[1].trim().toUpperCase() !== 'WOW') pizarraData.wow.push(c[1].trim());
                    if(c[2] && c[2].trim().toUpperCase() !== 'MOVISTAR') pizarraData.movistar.push(c[2].trim());
                });
                if(document.getElementById('modalPizarra').classList.contains('mostrar')) construirPizarra();
            } catch(e) { console.error(e); }
        }

        function construirPizarra() {
            const container = document.getElementById('pizarraContainer');
            container.innerHTML = '';
            const cats = [{k:'claro', t:'📱 CLARO', c:'claro'}, {k:'wow', t:'💜 WOW', c:'wow'}, {k:'movistar', t:'🔵 MOVISTAR', c:'movistar'}];
            
            cats.forEach(cat => {
                const div = document.createElement('div');
                div.className = `pizarra-seccion ${cat.c}`;
                let html = `<div class="pizarra-titulo">${cat.t}</div>`;
                pizarraData[cat.k].forEach(nom => {
                    const n = nom.trim();
                    const num = estrellasData[n] || 0;
                    const nEsc = n.replace(/'/g, "\\'");
                    html += `<div class="pizarra-asesor"><span>${n}</span><div><span class="estrellas-display">${'⭐'.repeat(num)}</span><button class="btn-estrella-pizarra" onclick="agregarEstrella('${nEsc}')">+</button></div></div>`;
                });
                div.innerHTML = html;
                container.appendChild(div);
            });
        }

        // --- LÓGICA BREAKS COMPLETA ---
        function setupBreakGrid() {
            const grid = document.getElementById('gridAsesores');
            grid.innerHTML = '';
            asesoresBreaks.forEach((nombre, idx) => {
                const esLid = LIDERES.includes(nombre.toUpperCase());
                const card = document.createElement('div');
                card.className = `card-break ${esLid?'lider':''}`;
                
                let duracion = nombre.toUpperCase() === "GIANELLA SUAREZ" ? 20 : 40;
                let display = breaksActivos[idx] ? breaksActivos[idx].display : `${duracion}:00`;
                let status = breaksActivos[idx] ? "EN BREAK" : "INICIAR";

                card.innerHTML = `
                    <div style="font-weight:bold">${nombre}${esLid?'<span class="lider-badge">LÍDER</span>':''}</div>
                    <div id="timer-${idx}" class="timer-display">${display}</div>
                    <button id="btn-${idx}" class="btn-start" onclick="pedirPass(${idx})" ${breaksActivos[idx]?'disabled':''}>${status}</button>
                    <button onclick="resetBreak(${idx})" style="margin-top:5px; font-size:0.7em; background:none; border:none; color:#666; cursor:pointer">Resetear</button>
                `;
                grid.appendChild(card);
            });
        }

        function pedirPass(idx) {
            if(prompt("Contraseña Admin:") === PASS_ADMIN) startBreak(idx);
            else alert("Error");
        }

        function startBreak(idx) {
            const nom = asesoresBreaks[idx];
            let segs = (nom.toUpperCase() === "GIANELLA SUAREZ" ? 20 : 40) * 60;
            
            breaksActivos[idx] = { inicio: Date.now(), duracion: segs, display: "" };
            localStorage.setItem('breaksActivos', JSON.stringify(breaksActivos));
            ejecutarTimer(idx, segs);
        }

        function ejecutarTimer(idx, tiempo) {
            const btn = document.getElementById('btn-'+idx);
            const disp = document.getElementById('timer-'+idx);
            if(btn) { btn.disabled = true; btn.innerText = "EN BREAK"; }

            intervalosActivos[idx] = setInterval(() => {
                let m = Math.floor(tiempo / 60);
                let s = tiempo % 60;
                let str = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(disp) disp.innerText = str;
                
                if(breaksActivos[idx]) { breaksActivos[idx].display = str; localStorage.setItem('breaksActivos', JSON.stringify(breaksActivos)); }

                if(tiempo <= 0) {
                    clearInterval(intervalosActivos[idx]);
                    if(disp) disp.innerText = "TERMINADO";
                    delete breaksActivos[idx];
                    localStorage.setItem('breaksActivos', JSON.stringify(breaksActivos));
                }
                tiempo--;
            }, 1000);
        }

        function resetBreak(idx) {
            if(prompt("Pass para reset:") === PASS_ADMIN) {
                clearInterval(intervalosActivos[idx]);
                delete breaksActivos[idx];
                localStorage.setItem('breaksActivos', JSON.stringify(breaksActivos));
                setupBreakGrid();
            }
        }

        // --- CARGA DE DATOS PRINCIPALES ---
        async function cargarDatos() {
            try {
                const res = await fetch(URL_SHEET + '&t=' + Date.now());
                const csv = await res.text();
                const filas = csv.split('\n').slice(1);
                let mapAsesores = new Map();

                filas.forEach(f => {
                    const c = f.replace(/\r/g, '').split(',');
                    if(c.length < 6 || !c[0].trim()) return;
                    let n = c[0].trim();
                    let data = {
                        n, 
                        ing: parseInt(c[1])||0, 
                        ccl: parseInt(c[2])||0, 
                        cop: parseInt(c[3])||0, 
                        prg: parseInt(c[4])||0, 
                        ins: parseInt(c[5])||0
                    };
                    if(mapAsesores.has(n)) {
                        let prev = mapAsesores.get(n);
                        mapAsesores.set(n, { ...data, ing: data.ing+prev.ing, ins: data.ins+prev.ins, prg: data.prg+prev.prg, ccl: data.ccl+prev.ccl, cop: data.cop+prev.cop });
                    } else mapAsesores.set(n, data);
                });

                let lista = Array.from(mapAsesores.values()).sort((a,b) => b.ins - a.ins);
                
                // Actualizar lista para breaks
                asesoresBreaks = lista.filter(a => !ASESORES_SIN_BREAKS.includes(a.n.toUpperCase())).map(a => a.n);
                LIDERES.forEach(l => { if(!asesoresBreaks.includes(l)) asesoresBreaks.push(l); });

                dibujarGrafico(lista);
                llenarTabla(lista);
                setupBreakGrid();
                reanudarTimers();
            } catch(e) { console.error(e); }
        }

        function reanudarTimers() {
            Object.keys(breaksActivos).forEach(idx => {
                if(!intervalosActivos[idx]) {
                    const b = breaksActivos[idx];
                    const transcurrido = Math.floor((Date.now() - b.inicio) / 1000);
                    const restante = b.duracion - transcurrido;
                    if(restante > 0) ejecutarTimer(idx, restante);
                    else { delete breaksActivos[idx]; localStorage.setItem('breaksActivos', JSON.stringify(breaksActivos)); }
                }
            });
        }

        function dibujarGrafico(lista) {
            const ctx = document.getElementById('rankingVentas').getContext('2d');
            if(miGrafico) miGrafico.destroy();
            miGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: lista.map((a,i) => (i===0?'👑 ':i===1?'🥈 ':i===2?'🥉 ':'') + a.n),
                    datasets: [{
                        label: 'INSTALADAS',
                        data: lista.map(a => a.ins),
                        backgroundColor: lista.map((a,i) => i<3?'rgba(255,215,0,0.6)':'rgba(0,191,255,0.4)'),
                        borderColor: '#fff', borderWidth: 1
                    }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
            });
        }

        function llenarTabla(lista) {
            const tbody = document.getElementById('cuerpoTabla');
            tbody.innerHTML = lista.map(a => {
                const tot = a.ccl + a.cop + a.prg + a.ins;
                const conv = a.ing > 0 ? ((a.ins/a.ing)*100).toFixed(1) : 0;
                return `<tr><td>${a.n}</td><td>${a.ing}</td><td>${a.ccl}</td><td>${a.cop}</td><td>${a.prg}</td><td style="color:#00FF7F">${a.ins}</td><td>${tot}</td><td>${conv}%</td></tr>`;
            }).join('');
        }

        // Listeners
        document.getElementById('btnAbrirStats').onclick = () => document.getElementById('modalStats').classList.add('mostrar');
        document.getElementById('btnAbrirBreak').onclick = () => document.getElementById('modalBreak').classList.add('mostrar');
        document.getElementById('btnAbrirPizarra').onclick = () => { cargarDatosPizarra(); document.getElementById('modalPizarra').classList.add('mostrar'); };

        // Inicio
        cargarDatos();
        cargarDatosPizarra();
        setInterval(cargarDatos, 120000);
    </script>
</body>
</html>
