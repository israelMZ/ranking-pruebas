<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Élite 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Importante para que el lienzo 3D ocupe todo */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .video-fondo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-10px); text-shadow: 0 0 25px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { 
            position: absolute; /* Para que flote sobre el lienzo 3D */
            top: 40px;
            color: #FFD700; 
            text-align: center; 
            z-index: 1; 
            font-size: 2.5em;
            margin: 0;
            animation: flotarYBrillar 3s ease-in-out infinite;
        }

        /* Contenedor para el lienzo 3D */
        #contenedor3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
        Tu navegador no soporta videos.
    </video>

    <div class="overlay"></div>

    <h1>🏆 TABLA DE PUNTUACIÓN 🏆</h1>

    <div id="contenedor3d"></div>

    <script>
        // --- DATOS DEL EQUIPO ---
        const datosVentas = [
            { nombre: 'Sasha', porcentaje: 120 },
            { nombre: 'Jeyko', porcentaje: 95 },
            { nombre: 'Rickson', porcentaje: 82 },
            { nombre: 'Italo', porcentaje: 70 },
            { nombre: 'Isabelle', porcentaje: 45 }
        ];

        // --- CONFIGURACIÓN DE THREE.JS ---
        const contenedor = document.getElementById('contenedor3d');
        const escena = new THREE.Scene();
        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // alpha: true para fondo transparente
        renderer.setSize(window.innerWidth, window.innerHeight);
        contenedor.appendChild(renderer.domElement);

        // --- LUCES ---
        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.5);
        escena.add(luzAmbiente);
        const luzPuntual = new THREE.PointLight(0xffffff, 1);
        luzPuntual.position.set(10, 10, 10);
        escena.add(luzPuntual);

        // --- CREACIÓN DE LAS BARRAS 3D Y ETIQUETAS ---
        const grupoBarras = new THREE.Group(); // Para animar todo el stack junto
        escena.add(grupoBarras);

        const materialVidrio = new THREE.MeshPhongMaterial({
            color: 0xffffff,
            specular: 0xffffff,
            shininess: 100,
            opacity: 0.3,
            transparent: true,
            side: THREE.DoubleSide
        });

        // Función para crear texturas de texto para las etiquetas
        function crearTexturaTexto(texto) {
            const canvasTexto = document.createElement('canvas');
            const ctx Texto = canvasTexto.getContext('2d');
            canvasTexto.width = 256;
            canvasTexto.height = 64;
            ctxTexto.font = 'Bold 32px Segoe UI';
            ctxTexto.fillStyle = 'white';
            ctxTexto.textAlign = 'center';
            ctxTexto.textBaseline = 'middle';
            ctxTexto.fillText(texto, 128, 32);
