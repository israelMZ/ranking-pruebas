<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ventas Pro - Meta Ads</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- ESTILOS GENERALES --- */
        body { margin: 0; padding: 20px; color: white; font-family: 'Segoe UI', Arial, sans-serif; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .video-fondo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: -1; }

        h1 { color: #FFD700; text-align: center; font-size: 3em; letter-spacing: 2px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); margin: 10px 0; font-weight: 900; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            width: 95%; max-width: 1400px; background: rgba(30, 30, 35, 0.7); padding: 30px; border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); z-index: 1; position: relative;
        }

        .chart-wrapper { position: relative; height: 65vh; width: 100%; }

        /* --- BOTONES INFERIORES --- */
        .cont-botones { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .btn-ui {
            padding: 12px 35px; font-size: 1.1em; font-weight: bold; color: white;
            border-radius: 30px; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; letter-spacing: 1px; border: 2px solid; background: rgba(0,0,0,0.5);
        }
        .btn-azul { border-color: #00BFFF; box-shadow: 0 0 10px rgba(0, 191, 255, 0.5); }
        .btn-naranja { border-color: #FF4500; box-shadow: 0 0 10px rgba(255, 69, 0, 0.5); }
        .btn-azul:hover { background: #00BFFF; box-shadow: 0 0 20px #00BFFF; }
        .btn-naranja:hover { background: #FF4500; box-shadow: 0 0 20px #FF4500; }

        /* --- MODALES --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal.mostrar { display: flex; }
        .modal-content { background: #1a1a1c; padding: 30px; border-radius: 15px; width: 90%; max-width: 1000px; max-height: 80vh; overflow-y: auto; position: relative; border: 1px solid #444; }
        .cerrar { position: absolute; top: 15px; right: 20px; font-size: 2em; cursor: pointer; color: #fff; }

        /* --- TABLA --- */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #111; color: #00BFFF; padding: 15px; text-align: center; }
        td { padding: 12px; border-bottom: 1px solid #333; text-align: center; font-weight: bold; }

        /* --- ESTILOS BREAK --- */
        .grid-asesores { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card-break { background: #25252b; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .timer-display { font-size: 1.8em; font-family: monospace; color: #FF4500; margin: 10px 0; }
        .btn-start { background: #FF4500; border: none; color: white; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-start:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <h1>🏆 RANKING DE VENTAS 🏆</h1>
    
    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>
        <div class="cont-botones">
            <button onclick="abrirModal('modalStats')" class="btn-ui btn-azul">📊 TABLA DETALLADA</button>
            <button onclick="abrirModal('modalBreak')" class="btn-ui btn-naranja">☕ CONTROL BREAK</button>
        </div>
    </div>

    <div id="modalStats" class="modal">
        <div class="modal-content">
            <span class="cerrar" onclick="cerrarModal('modalStats')">×</span>
            <h2 style="color:#00BFFF; text-align:center">DETALLE DE VENTAS</h2>
            <div id="divTabla"></div>
        </div>
    </div>

    <div id="modalBreak" class="modal">
        <div class="modal-content">
            <span class="cerrar" onclick="cerrarModal('modalBreak')">×</span>
            <h2 style="color:#FF4500; text-align:center">CRONÓMETRO DE BREAK (35 MIN)</h2>
            <div id="gridAsesores" class="grid-asesores">
                </div>
        </div>
    </div>

    <script>
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfvuQqIcH6Zv8rqvsqeolWoX7Z3lIKZqz2nX-Q0aCRBZcPRvXAXz8rjKyoAZ-OmiI9GfpNkMjK9Uht/pub?output=csv';
        let chartInstance = null;
        let asesoresList = [];

        async function updateData() {
            try {
                const res = await fetch(`${URL_CSV}&v=${Date.now()}`);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                
                let stats = rows.map(row => {
                    const c = row.split(',');
                    return {
                        nombre: c[0].replace(/"/g, '').trim(),
                        ingresadas: parseInt(c[1]) || 0,
                        instaladas: parseInt(c[5]) || 0,
                        conv: c[1] > 0 ? ((c[5]/c[1])*100).toFixed(1) : 0
                    };
                }).filter(a => a.nombre !== "").sort((a,b) => b.instaladas - a.instaladas);

                asesoresList = stats.map(a => a.nombre);
                renderChart(stats);
                renderTable(stats);
                setupBreakGrid();
            } catch (e) { console.error(e); }
        }

        function setupBreakGrid() {
            const grid = document.getElementById('gridAsesores');
            if (grid.children.length > 0) return; // No recrear si ya existen

            asesoresList.forEach((nombre, index) => {
                const card = document.createElement('div');
                card.className = 'card-break';
                card.innerHTML = `
                    <div style="font-weight:bold; height: 40px; display:flex; align-items:center; justify-content:center;">${nombre}</div>
                    <div id="timer-${index}" class="timer-display">35:00</div>
                    <button id="btn-${index}" class="btn-start" onclick="startBreak(${index})">INICIAR BREAK</button>
                `;
                grid.appendChild(card);
            });
        }

        function startBreak(index) {
            const btn = document.getElementById(`btn-${index}`);
            const display = document.getElementById(`timer-${index}`);
            let tiempo = 35 * 60; // 35 minutos en segundos

            btn.disabled = true;
            btn.innerText = "EN BREAK...";

            const intervalo = setInterval(() => {
                let minutos = Math.floor(tiempo / 60);
                let segundos = tiempo % 60;

                minutos = minutos < 10 ? '0' + minutos : minutos;
                segundos = segundos < 10 ? '0' + segundos : segundos;

                display.innerText = `${minutos}:${segundos}`;

                if (tiempo <= 0) {
                    clearInterval(intervalo);
                    display.innerText = "TERMINADO";
                    display.style.color = "#00FF7F";
                    btn.innerText = "BREAK FINALIZADO";
                } else {
                    tiempo--;
                }
            }, 1000);
        }

        function renderChart(data) {
            const ctx = document.getElementById('rankingVentas').getContext('2d');
            const colors = data.map((_, i) => i < 8 ? '#D4AF37' : '#00FF7F');

            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map((a, i) => {
                        let prefijo = i === 0 ? '👑 ' : i === 1 ? '🥈 ' : i === 2 ? '🥉 ' : '👤 ';
                        return prefijo + a.nombre;
                    }),
                    datasets: [{
                        data: data.map(a => a.instaladas),
                        backgroundColor: colors,
                        borderColor: colors,
                        borderWidth: 1,
                        borderRadius: 5,
                        barThickness: 15
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { beginAtZero: true, grid: { color: '#333' }, ticks: { color: '#888' } },
                        y: { ticks: { color: '#fff', font: { size: 12, weight: 'bold' } }, grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.9)',
                            callbacks: {
                                label: function(context) {
                                    const d = data[context.dataIndex];
                                    return [`✅ Instaladas: ${d.instaladas}`, `📩 Ingresadas: ${d.ingresadas}`, `📊 Conv: ${d.conv}%` ];
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderTable(data) {
            let html = `<table><thead><tr><th>ASESOR</th><th>INGRESADAS</th><th>INSTALADAS</th><th>% CONV</th></tr></thead><tbody>`;
            data.forEach(a => {
                html += `<tr><td>${a.nombre}</td><td>${a.ingresadas}</td><td style="color:#00FF7F">${a.instaladas}</td><td style="color:#FFD700">${a.conv}%</td></tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('divTabla').innerHTML = html;
        }

        function abrirModal(id) { document.getElementById(id).classList.add('mostrar'); }
        function cerrarModal(id) { document.getElementById(id).classList.remove('mostrar'); }

        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
