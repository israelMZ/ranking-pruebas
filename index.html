<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking y Control de Break - Meta Ads Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- ESTILOS GENERALES Y FONDO --- */
        body { margin: 0; padding: 40px; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .video-fondo { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -2; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: -1; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            width: 90%; max-width: 1300px; background: rgba(20, 20, 25, 0.4); padding: 40px; border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); z-index: 1; display: flex; flex-direction: column; align-items: center;
        }

        .chart-wrapper { position: relative; height: 60vh; min-height: 500px; width: 100%; }
        
        @keyframes flotarYBrillar {
            0% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
            50% { transform: translateY(-10px); text-shadow: 0 0 30px #FFD700, 0 0 15px #FFF; }
            100% { transform: translateY(0px); text-shadow: 0 0 10px #FFD700; }
        }

        h1 { color: #FFD700; text-align: center; z-index: 1; font-size: 3.5em; letter-spacing: 3px; margin-bottom: 20px; animation: flotarYBrillar 3s ease-in-out infinite; }

        /* --- BOTONES --- */
        .cont-botones { display: flex; gap: 20px; margin-top: 30px; }
        
        .btn-general {
            padding: 15px 40px; font-size: 1.1em; font-weight: bold; color: white;
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease; 
            text-transform: uppercase; letter-spacing: 2px; border: 2px solid;
        }

        .btn-stats { background: rgba(0, 191, 255, 0.2); border-color: #00BFFF; box-shadow: 0 0 15px rgba(0, 191, 255, 0.4); }
        .btn-stats:hover { background: #00BFFF; box-shadow: 0 0 30px rgba(0, 191, 255, 0.8); transform: scale(1.05); }

        .btn-break { background: rgba(255, 69, 0, 0.2); border-color: #FF4500; box-shadow: 0 0 15px rgba(255, 69, 0, 0.4); }
        .btn-break:hover { background: #FF4500; box-shadow: 0 0 30px rgba(255, 69, 0, 0.8); transform: scale(1.05); }

        /* --- MODALES --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); z-index: 999;
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-overlay.mostrar { display: flex; }

        .modal-contenido {
            background: rgba(20, 20, 25, 0.9); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 1300px; max-height: 90vh; display: flex; flex-direction: column; position: relative;
        }

        .modal-titulo { font-size: 2em; margin-bottom: 20px; text-align: center; }
        .btn-cerrar { position: absolute; top: 20px; right: 30px; font-size: 2em; color: white; cursor: pointer; }

        /* --- TABLA --- */
        .contenedor-tabla { overflow-y: auto; flex-grow: 1; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { padding: 15px; background: #111; position: sticky; top: 0; border-bottom: 2px solid #444; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: bold; }
        .col-naranja { color: #FFB04F; } .col-rojo { color: #FF6347; } .col-verde { color: #32CD32; }

        /* --- GRID DE BREAKS --- */
        .grid-breaks {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px;
            overflow-y: auto; padding: 10px;
        }
        .card-break {
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .timer-display { font-size: 2.2em; font-weight: bold; margin: 10px 0; color: #00FF7F; font-family: monospace; }
        .timer-warning { color: #FF4500 !important; animation: parpadeo 1s infinite; }
        @keyframes parpadeo { 50% { opacity: 0.3; } }

        .btn-accion-timer {
            width: 100%; padding: 10px; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; color: white; transition: 0.3s;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <h1>🏆 RANKING DE VENTAS 🏆</h1>
    
    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>
        <div class="cont-botones">
            <button id="btnAbrirStats" class="btn-general btn-stats">📊 TABLA DETALLADA</button>
            <button id="btnAbrirBreak" class="btn-general btn-break">☕ CONTROL BREAK</button>
        </div>
    </div>

    <div id="modalStats" class="modal-overlay">
        <div class="modal-contenido">
            <span class="btn-cerrar" onclick="cerrarModal('modalStats')">✖</span>
            <h2 class="modal-titulo" style="color: #00BFFF;">REPORTE DETALLADO DEL EQUIPO</h2>
            <div class="contenedor-tabla">
                <table>
                    <thead>
                        <tr>
                            <th>ASESOR</th>
                            <th class="col-naranja">INGRESOS</th>
                            <th class="col-rojo">CANC. CLIENTE</th>
                            <th class="col-rojo">CANC. OP</th>
                            <th class="col-verde">INSTALADAS</th>
                            <th class="col-naranja">CONV. %</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalBreak" class="modal-overlay">
        <div class="modal-contenido">
            <span class="btn-cerrar" onclick="cerrarModal('modalBreak')">✖</span>
            <h2 class="modal-titulo" style="color: #FF4500;">⏱️ TIEMPO DE BREAK (35 MIN)</h2>
            <div id="contenedorBreaks" class="grid-breaks"></div>
        </div>
    </div>

    <script>
        const URL_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfvuQqIcH6Zv8rqvsqeolWoX7Z3lIKZqz2nX-Q0aCRBZcPRvXAXz8rjKyoAZ-OmiI9GfpNkMjK9Uht/pub?output=csv';
        
        let miGrafico = null;
        let timersActivos = {}; // Para que los tiempos no se borren al refrescar datos

        async function cargarDatos() {
            try {
                const urlConFiltro = URL_SHEET + '&t=' + new Date().getTime();
                const respuesta = await fetch(urlConFiltro);
                const dataRaw = await respuesta.text();
                const filas = dataRaw.split('\n').slice(1); 
                
                let asesoresMap = new Map();

                filas.forEach(linea => {
                    const c = linea.replace(/\r/g, '').split(','); 
                    if(c.length < 6 || c[0].trim() === '' || c[0].trim().toUpperCase() === 'ASESOR') return; 
                    
                    const nombre = c[0].trim();
                    const ingresos = parseInt(c[1]) || 0;
                    const cancCliente = parseInt(c[2]) || 0;
                    const cancOp = parseInt(c[3]) || 0;
                    const programada = parseInt(c[4]) || 0;
                    const instaladas = parseInt(c[5]) || 0;

                    if (asesoresMap.has(nombre)) {
                        const as = asesoresMap.get(nombre);
                        as.ingresos += ingresos; as.cancCliente += cancCliente; 
                        as.cancOp += cancOp; as.programada += programada; as.instaladas += instaladas;
                    } else {
                        asesoresMap.set(nombre, { nombre, ingresos, cancCliente, cancOp, programada, instaladas });
                    }
                });

                let listaOrdenada = Array.from(asesoresMap.values()).sort((a, b) => b.instaladas - a.instaladas);

                llenarTabla(listaOrdenada);
                dibujarGrafico(listaOrdenada);
                actualizarCardsBreak(listaOrdenada);

            } catch (e) { console.error("Error:", e); }
        }

        function llenarTabla(asesores) {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = asesores.map(as => {
                const conv = as.ingresos > 0 ? ((as.instaladas / as.ingresos) * 100).toFixed(1) : "0.0";
                return `<tr>
                    <td>${as.nombre}</td>
                    <td class="col-naranja">${as.ingresos}</td>
                    <td class="col-rojo">${as.cancCliente}</td>
                    <td class="col-rojo">${as.cancOp}</td>
                    <td class="col-verde">${as.instaladas}</td>
                    <td class="col-naranja">${conv}%</td>
                </tr>`;
            }).join('');
        }

        function dibujarGrafico(asesores) {
            const ctx = document.getElementById('rankingVentas').getContext('2d');
            const labels = asesores.map((as, i) => (i < 3 ? ['👑','🥈','🥉'][i] : '') + ' ' + as.nombre);
            const valores = asesores.map(as => as.instaladas);

            if (miGrafico) miGrafico.destroy();

            miGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Instaladas',
                        data: valores,
                        backgroundColor: 'rgba(0, 191, 255, 0.6)',
                        borderColor: '#00BFFF',
                        borderWidth: 2,
                        borderRadius: 10
                    }]
                },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    scales: { x: { beginAtZero: true, grid: { color: '#333' } }, y: { grid: { display: false }, ticks: { color: '#fff', font: { weight: 'bold' } } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // LÓGICA DE BREAKS
        function actualizarCardsBreak(asesores) {
            const contenedor = document.getElementById('contenedorBreaks');
            
            asesores.forEach(as => {
                const idDiv = `card-${as.nombre.replace(/\s+/g, '')}`;
                if (!document.getElementById(idDiv)) {
                    const card = document.createElement('div');
                    card.id = idDiv
