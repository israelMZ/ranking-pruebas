<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking y Control de Break - Meta Ads Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- ESTILOS GENERALES Y FONDO --- */
        body { margin: 0; padding: 40px; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; background: #000; }
        .video-fondo { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -2; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: -1; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            width: 90%; max-width: 1300px; background: rgba(20, 20, 25, 0.6); padding: 40px; border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); z-index: 1; display: flex; flex-direction: column; align-items: center;
        }

        .chart-wrapper { position: relative; height: 65vh; min-height: 500px; width: 100%; }
        h1 { color: #FFD700; text-align: center; font-size: 3.5em; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }

        /* --- BOTONES --- */
        .cont-botones { display: flex; gap: 20px; margin-top: 30px; }
        .btn-general {
            padding: 15px 40px; font-size: 1.1em; font-weight: bold; color: white;
            border-radius: 50px; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; letter-spacing: 2px; border: 2px solid;
        }
        .btn-stats { background: rgba(0, 191, 255, 0.2); border-color: #00BFFF; box-shadow: 0 0 15px rgba(0, 191, 255, 0.4); }
        .btn-break { background: rgba(255, 69, 0, 0.2); border-color: #FF4500; box-shadow: 0 0 15px rgba(255, 69, 0, 0.4); }
        .btn-stats:hover { background: #00BFFF; } .btn-break:hover { background: #FF4500; }

        /* --- MODALES --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); z-index: 999;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.mostrar { display: flex; }
        .modal-contenido {
            background: rgba(20, 20, 25, 0.95); padding: 40px; border-radius: 20px; 
            width: 100%; max-width: 1200px; max-height: 90vh; display: flex; flex-direction: column; position: relative;
        }
        .btn-cerrar { position: absolute; top: 20px; right: 30px; font-size: 2em; color: white; cursor: pointer; }

        /* --- TABLA --- */
        .contenedor-tabla { overflow-y: auto; flex-grow: 1; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; background: #111; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: bold; }

        /* --- BREAKS --- */
        .grid-breaks { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; overflow-y: auto; }
        .card-break { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .timer-display { font-size: 2.2em; font-weight: bold; margin: 10px 0; color: #00FF7F; font-family: monospace; }
        .timer-warning { color: #FF4500 !important; animation: parpadeo 1s infinite; }
        @keyframes parpadeo { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-fondo">
        <source src="tigre.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <h1>🏆 RANKING DE VENTAS 🏆</h1>
    
    <div class="container">
        <div class="chart-wrapper">
            <canvas id="rankingVentas"></canvas>
        </div>
        <div class="cont-botones">
            <button id="btnAbrirStats" class="btn-general btn-stats">📊 TABLA DETALLADA</button>
            <button id="btnAbrirBreak" class="btn-general btn-break">☕ CONTROL BREAK</button>
        </div>
    </div>

    <div id="modalStats" class="modal-overlay">
        <div class="modal-contenido">
            <span class="btn-cerrar" onclick="cerrarModal('modalStats')">✖</span>
            <h2 style="color: #00BFFF; text-align: center;">REPORTE DETALLADO</h2>
            <div class="contenedor-tabla">
                <table>
                    <thead>
                        <tr>
                            <th>ASESOR</th>
                            <th>INGRESOS</th>
                            <th>CANC. CLIENTE</th>
                            <th>CANC. OP</th>
                            <th>INSTALADAS</th>
                            <th>CONV %</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalBreak" class="modal-overlay">
        <div class="modal-contenido">
            <span class="btn-cerrar" onclick="cerrarModal('modalBreak')">✖</span>
            <h2 style="color: #FF4500; text-align: center;">⏱️ BREAK (35 MIN)</h2>
            <div id="contenedorBreaks" class="grid-breaks"></div>
        </div>
    </div>

    <script>
        // TU URL DE GOOGLE SHEETS
        const URL_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfvuQqIcH6Zv8rqvsqeolWoX7Z3lIKZqz2nX-Q0aCRBZcPRvXAXz8rjKyoAZ-OmiI9GfpNkMjK9Uht/pub?output=csv';
        
        let miGrafico = null;
        let timersActivos = {}; 

        async function cargarDatos() {
            try {
                const response = await fetch(`${URL_SHEET}&cacheburst=${Date.now()}`);
                const csvData = await response.text();
                
                // Dividir filas y limpiar espacios/comillas
                const filas = csvData.split(/\r?\n/).map(f => f.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
                
                let asesoresMap = new Map();

                // Empezamos desde i=1 para saltar la cabecera
                for(let i = 1; i < filas.length; i++) {
                    const c = filas[i];
                    if(!c[0] || c[0].toUpperCase() === 'ASESOR') continue;

                    const nombre = c[0];
                    const ingresos = parseInt(c[1]) || 0;
                    const c_cli = parseInt(c[2]) || 0;
                    const c_op = parseInt(c[3]) || 0;
                    const prog = parseInt(c[4]) || 0;
                    const inst = parseInt(c[5]) || 0;

                    if(asesoresMap.has(nombre)) {
                        let a = asesoresMap.get(nombre);
                        a.ingresos += ingresos; a.c_cli += c_cli; a.c_op += c_op; a.prog += prog; a.inst += inst;
                    } else {
                        asesoresMap.set(nombre, { nombre, ingresos, c_cli, c_op, prog, inst });
                    }
                }

                const dataArray = Array.from(asesoresMap.values()).sort((a,b) => b.inst - a.inst);
                
                if(dataArray.length > 0) {
                    renderizarTodo(dataArray);
                } else {
                    console.warn("No se encontraron datos válidos en el CSV");
                }

            } catch (error) {
                console.error("Error cargando el Excel:", error);
            }
        }

        function renderizarTodo(data) {
            // 1. Tabla
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = data.map(as => `
                <tr>
                    <td>${as.nombre}</td>
                    <td>${as.ingresos}</td>
                    <td>${as.c_cli}</td>
                    <td>${as.c_op}</td>
                    <td style="color:#00FF7F">${as.inst}</td>
                    <td>${as.ingresos > 0 ? ((as.inst/as.ingresos)*100).toFixed(1) : 0}%</td>
                </tr>
            `).join('');

            // 2. Gráfico
            const ctx = document.getElementById('rankingVentas').getContext('2d');
            if(miGrafico) miGrafico.destroy();
            miGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map((as, i) => `${i<3?['👑','🥈','🥉'][i]:''} ${as.nombre}`),
                    datasets: [{
                        label: 'Ventas Instaladas',
                        data: data.map(as => as.inst),
                        backgroundColor: 'rgba(0, 191, 255, 0.6)',
                        borderColor: '#00BFFF',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    scales: { 
                        x: { beginAtZero: true, ticks: { color: '#aaa' } },
                        y: { ticks: { color: '#fff', font: { weight: 'bold', size: 14 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // 3. Cards de Break
            const contBreak = document.getElementById('contenedorBreaks');
            data.forEach(as => {
                const idCard = `card-${as.nombre.replace(/\s+/g, '')}`;
                if(!document.getElementById(idCard)) {
                    const div = document.createElement('div');
                    div.id = idCard;
                    div.className = 'card-break';
                    div.innerHTML = `
                        <h4>${as.nombre}</h4>
                        <div class="timer-display" id="time-${idCard}">35:00</div>
                        <button onclick="controlTimer('${as.nombre}', '${idCard}')" id="btn-${idCard}" style="width:100%; padding:10px; cursor:pointer; background:#222; color:#00BFFF; border:1px solid #00BFFF; border-radius:10px; font-weight:bold;">INICIAR</button>
                    `;
                    contBreak.appendChild(div);
                }
            });
        }

        function controlTimer(nombre, id) {
            const display = document.getElementById(`time-${id}`);
            const btn = document.getElementById(`btn-${id}`);

            if(timersActivos[nombre]) {
                clearInterval(timersActivos[nombre]);
                delete timersActivos[nombre];
                btn.innerText = "REANUDAR";
                btn.style.background = "#222";
            } else {
                let [m, s] = display.innerText.split(':').map(Number);
                let total = m * 60 + s;
                btn.innerText = "PAUSAR";
                btn.style.background = "#FF4500";

                timersActivos[nombre] = setInterval(() => {
                    total--;
                    if(total <= 0) {
                        clearInterval(timersActivos[nombre]);
                        display.innerText = "FIN";
                        display.classList.add('timer-warning');
                    } else {
                        display.innerText = `${Math.floor(total/60)}:${(total%60).toString().padStart(2,'0')}`;
                    }
                }, 1000);
            }
        }

        function cerrarModal(id) { document.getElementById(id).classList.remove('mostrar'); }
        document.getElementById('btnAbrirStats').onclick = () => document.getElementById('modalStats').classList.add('mostrar');
        document.getElementById('btnAbrirBreak').onclick = () => document.getElementById('modalBreak').classList.add('mostrar');

        cargarDatos();
        setInterval(cargarDatos, 60000); // Actualiza cada minuto
    </script>
</body>
</html>
